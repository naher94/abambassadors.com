name: Update Hospitality Talks Episodes

on:
  # schedule:
  #   - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-episodes:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Fetch YouTube RSS feed
        run: |
          curl --retry 3 --retry-delay 5 -s \
            "https://www.youtube.com/feeds/videos.xml?channel_id=UCVBfsbg4K5sq6aPljJdWDBg" \
            -o youtube-feed.xml

      - name: Validate feed
        id: validate
        run: |
          if ! head -1 youtube-feed.xml | grep -q '<?xml'; then
            echo "Warning: YouTube did not return a valid feed (likely a temporary block or rate-limit)."
            echo "First 5 lines of downloaded file:"
            head -5 youtube-feed.xml
            echo "Skipping this run — will retry on next scheduled run."
            echo "valid=false" >> $GITHUB_OUTPUT
          else
            echo "Feed validated as XML"
            echo "valid=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate episode files
        if: steps.validate.outputs.valid == 'true'
        run: python3 _scripts/update-episodes.py youtube-feed.xml

      - name: Clean up feed file
        if: always()
        run: rm -f youtube-feed.xml

      - name: Commit new episodes
        if: steps.validate.outputs.valid == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _hospitality-talks/
          git diff --staged --quiet || git commit -m "Auto-update Hospitality Talks episodes"
          git push
